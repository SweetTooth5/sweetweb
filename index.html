<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>The Truth Bomb</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      color: white;
      text-align: center;

      /* BACKGROUND IMAGE + DARK OVERLAY */
      background: 
        linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
        url('Image web.png') no-repeat center center fixed;

      background-size: cover;
    }

    /* GLOWING HEADERS */
    h1 {
      font-size: 2.5em;
      color: #ff0055;
      text-shadow:
        0 0 5px #ff0055,
        0 0 10px #ff0055,
        0 0 20px #ff3399,
        0 0 40px #ff3399,
        0 0 60px #ff66cc;
    }

    h3 {
      font-size: 1.3em;
      color: #ff77aa;
      text-shadow:
        0 0 3px #ff77aa,
        0 0 6px #ff77aa,
        0 0 10px #ff99cc,
        0 0 15px #ff99cc;
    }

    .box {
      margin-top: 100px;
      background: rgba(0,0,0,0.6);
      padding: 30px;
      border-radius: 12px;
      display: inline-block;
      width: 90%;
      max-width: 400px;
    }

    input, textarea {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 6px;
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #ff0055;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #cc0044;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="box">
  <h2>Place CODE 🔐</h2>
  <input type="password" id="codeInput" placeholder="Enter code">
  <br>
  <button onclick="checkCode()">Enter</button>
</div>

<!-- MAIN CONTENT -->
<div id="content" class="box" style="display:none;">
  <h1>The Truth Bomb</h1>
  <h3>Confess, Expose, Share Thought.........</h3>

  <form action="https://formspree.io/f/mjgpvjez" method="POST">
    <textarea name="message" placeholder="Type your message..." required></textarea><br>
    <button type="submit">Send</button>
  </form>
</div>

<script>
  // Auto-login if already entered before
  if (localStorage.getItem("access") === "granted") {
    document.getElementById("login").style.display = "none";
    document.getElementById("content").style.display = "block";
  }

  function checkCode() {
    var code = document.getElementById("codeInput").value;

    if (code === "0000") {
      localStorage.setItem("access", "granted");
      location.reload();
    } else {
      alert("Access denied");
    }
  }
</script>

</body>
</html>
