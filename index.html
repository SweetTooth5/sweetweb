<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SweetTooth | CS Study Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>SweetTooth Hub 🦷</h1>
            <p>Computational Resources for A-Level CS Students</p>
        </header>

        <!-- PDF Resource Section -->
        <section class="resource-hub">
            <h2>University Resources</h2>
            <div class="pdf-container">
                <h3>📄 Upper Karnaugh Map</h3>
                <!-- Link to open PDF in new tab -->
                <a href="upper-karnaugh-map.pdf" target="_blank" class="btn-download">
                    Open PDF (Upper Karnaugh Map)
                </a>
                <div class="pdf-actions">
                    <!-- Link for downloading the PDF -->
                    <a href="upper-karnaugh-map.pdf" download class="btn-download">Download PDF</a>
                </div>
            </div>
        </section>

        <!-- Notes Input Section -->
        <section class="note-input">
            <h2>Add Study Notes</h2>
            <input type="text" id="noteTitle" placeholder="Topic (e.g. Logic Gates)">
            <textarea id="noteContent" placeholder="Key takeaways..."></textarea>
            <button onclick="addNote()" class="btn-post">Post to Hub</button>
        </section>

        <!-- Notes Display Section -->
        <section id="notesDisplay" class="notes-grid">
            <!-- JavaScript will inject notes here -->
        </section>
    </div>
    <script src="javascript.js"></script>
</body>
</html>
