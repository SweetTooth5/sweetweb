<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SweetTooth | Study Hub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>SweetTooth Study Hub</h1>
            <p>Share and organize your study notes</p>
        </header>

        <section class="note-input">
            <input type="text" id="noteTitle" placeholder="Subject/Title">
            <textarea id="noteContent" placeholder="Type your notes here..."></textarea>
            <button onclick="addNote()">Post Note</button>
        </section>

        <section id="notesDisplay" class="notes-grid">
            <!-- Notes will appear here dynamically -->
        </section>
    </div>
    <script src="javascript.js"></script>
</body>
</html>
